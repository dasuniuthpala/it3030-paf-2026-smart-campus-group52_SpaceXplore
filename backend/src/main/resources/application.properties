spring.application.name=demo

#Create PostgreSQL DB as "SpaceXplore" in pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/SpaceXplore
# add your PostgreSQL username and password
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Change port if you need
server.port=8081

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000